# Карта маршрутов: GET /api/business/mapbox-config — это Next.js App Route (читает MAPBOX_PUBLIC_TOKEN
# из env контейнера frontend, как при npm run dev). Общий location /api идёт в Laravel — без этого блока
# токен в frontend/.env.local не используется, если не продублирован в backend/.env.
location = /api/business/mapbox-config {
    proxy_pass http://frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
}
