# Партнёрский архив: tar по всему репо может занимать >5 мин.
# Таймауты только здесь (base без fastcgi_*_timeout, иначе дубль с fastcgi-laravel.conf).
location = /api/admin/backups/partner-export {
    include snippets/fastcgi-laravel-base.conf;
    fastcgi_connect_timeout 60s;
    fastcgi_read_timeout 3600s;
    fastcgi_send_timeout 3600s;
}
