user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # Базовые настройки
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    client_max_body_size 100M;
    
    # Буферизация для производительности
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;
    
    # Кэширование
    open_file_cache max=10000 inactive=30s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;
    
    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;
    
    # Upstream с keepalive — имя сервиса из docker-compose (не только container_name)
    upstream frontend {
        server frontend:3003;
        keepalive 64;
    }
    
    # FastCGI к php-fpm в контейнере backend (имя сервиса docker-compose: backend)
    upstream php_backend {
        server backend:9000;
        keepalive 32;
    }
    
    include /etc/nginx/conf.d/*.conf;
}
