# Upstream php_backend — в nginx.conf

# Frontend: rexten.live, www и dev.rexten.live — ОДИН upstream (frontend:3003).
# Отдельного «dev-контейнера» в docker-compose нет; см. docs/FRONTEND_DEV_DOMAIN.md
server {
    listen 80;
    server_name rexten.live www.rexten.live dev.rexten.live;

    client_max_body_size 100M;

    include snippets/location-api-partner-export.conf;
    include snippets/location-api-admin-backups.conf;

    include snippets/location-mapbox-next.conf;

    # Лендинг: картинки из public часто меняют при том же имени файла — не кэшировать на месяц как у всех .png
    location ^~ /img/landing/ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        add_header Cache-Control "no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires -1;
        access_log off;
    }

    location /api {
        include snippets/fastcgi-laravel.conf;
    }

    location /_next/static {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_cache_valid 200 1y;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        add_header Cache-Control "public, immutable, max-age=31536000";
        expires 1y;
        access_log off;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
        expires 30d;
        access_log off;
    }

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;

        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 32 8k;
        proxy_busy_buffers_size 16k;
        proxy_temp_file_write_size 16k;
        proxy_max_temp_file_size 256m;

        proxy_cache_bypass $http_upgrade;
        proxy_redirect off;
    }
}

# api.rexten.live
server {
    listen 80;
    server_name api.rexten.live;

    client_max_body_size 100M;

    include snippets/location-api-partner-export.conf;
    include snippets/location-api-admin-backups.conf;

    location ^~ /storage {
        root /var/www/html/public;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept";
        access_log off;
    }

    # Статика из public/images (письма раньше отдавали 404 через index.php)
    location ^~ /images/ {
        root /var/www/html/public;
        include /etc/nginx/mime.types;
        default_type application/octet-stream;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    location / {
        include snippets/fastcgi-laravel.conf;
    }
}
