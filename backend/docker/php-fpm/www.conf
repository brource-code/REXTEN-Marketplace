; Pool для production (Docker). Заменяет дефолтный www.conf образа php:fpm.
[www]
user = www-data
group = www-data

listen = 9000
listen.owner = www-data
listen.group = www-data

pm = dynamic
pm.max_children = 50
pm.start_servers = 10
pm.min_spare_servers = 10
pm.max_spare_servers = 20
pm.max_requests = 500

clear_env = no
catch_workers_output = yes
decorate_workers_output = no
