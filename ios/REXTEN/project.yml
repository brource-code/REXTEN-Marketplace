# XcodeGen — из каталога ios/REXTEN: xcodegen generate
name: REXTEN
targets:
  REXTEN:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
        excludes:
          - "**/.DS_Store"
      - path: Assets.xcassets
    resources:
      - Resources
    settings:
      base:
        INFOPLIST_FILE: Sources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.rexten.client
        PRODUCT_NAME: REXTEN
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: 1.0.0
        BUNDLE_DISPLAY_NAME: REXTEN
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        SWIFT_VERSION: "5.0"
options:
  bundleIdPrefix: com.rexten
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
